global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "worker-email"
    static_configs:
      - targets: ["worker-email:8000"]

  - job_name: "worker-calendar"
    static_configs:
      - targets: ["worker-calendar:8000"]
